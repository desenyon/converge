name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              data = tomllib.load(handle)
          print(data["project"]["version"])
          PY
          )
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "${RAW_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag/version mismatch: got ${RAW_TAG}, expected ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    # Trusted Publishing: run when a version tag is pushed or a GitHub Release is published.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/converge-cli
    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: read
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-github:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub Releases
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
